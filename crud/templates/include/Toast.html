<div class="fixed bottom-5 right-5 z-50 space-y-3">
    {% for message in messages %}
    <div data-toast class="motion-preset-slide-up {% if message.tags == 'error' %}bg-red-600{% else %}bg-green-600{% endif %} text-white text-base font-semibold px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 min-w-[320px]">
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
